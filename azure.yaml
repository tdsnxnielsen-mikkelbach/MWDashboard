# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: mw-dashboard
metadata:
  template: MWDashboard@0.0.1
hooks:
  prepackage:
    shell: sh
    run: dotnet build -c Release
services:
  web:
    project: ./src/MWDashboard.Web
    host: containerapp
    language: dotnet
  collector:
    project: ./src/MWDashboard.Job
    host: containerapp
    language: dotnet
  ondemand:
    project: ./src/MWDashboard.Collector
    host: containerapp
    language: dotnet
infra:
  provider: bicep
  path: ./infra
  module: main

# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: mw-dashboard
metadata:
  template: MWDashboard@0.0.1
hooks:
  prepackage:
    shell: sh
    run: dotnet build -c Release
  postdeploy:
    shell: pwsh
    run: |
      Write-Host "Deploying consent-static to Azure Static Web App..."
      $swaName = $env:CONSENT_STATIC_NAME
      $rgName = (az group list --tag "azd-env-name=$env:AZURE_ENV_NAME" --query "[0].name" -o tsv)
      if (-not $swaName -or -not $rgName) { Write-Error "Could not resolve SWA name ($swaName) or resource group ($rgName)"; exit 1 }
      # Inject placeholders
      $html = Get-Content ./static/consent-complete/index.html -Raw
      $callbackUrl = "https://$($env:CONSENT_CALLBACK_FQDN)"
      $secret = $env:CONSENT_SHARED_SECRET
      $aiConnStr = $env:APPLICATIONINSIGHTS_CONNECTION_STRING
      if (-not $env:CONSENT_CALLBACK_FQDN) { Write-Error "CONSENT_CALLBACK_FQDN not set"; exit 1 }
      if (-not $secret) { Write-Error "CONSENT_SHARED_SECRET not set"; exit 1 }
      $html = $html.Replace('%%CONSENT_CALLBACK_URL%%', $callbackUrl)
      $html = $html.Replace('%%CONSENT_SHARED_SECRET%%', $secret)
      if ($aiConnStr) { $html = $html.Replace('%%APPINSIGHTS_CONNECTION_STRING%%', $aiConnStr) }
      Set-Content ./static/consent-complete/index.html -Value $html -NoNewline
      Write-Host "Injected consent callback URL: $callbackUrl"
      # Get deployment token and deploy
      $token = (az staticwebapp secrets list --name $swaName --resource-group $rgName --query "properties.apiKey" -o tsv)
      if (-not $token) { Write-Error "Could not retrieve SWA deployment token"; exit 1 }
      npx @azure/static-web-apps-cli deploy ./static/consent-complete --deployment-token $token --env production
      Write-Host "Static Web App deployed successfully"
services:
  web:
    project: ./src/MWDashboard.Web
    host: containerapp
    language: dotnet
  collector:
    project: ./src/MWDashboard.Job
    host: containerapp
    language: dotnet
  ondemand:
    project: ./src/MWDashboard.Collector
    host: containerapp
    language: dotnet
  consent:
    project: ./src/MWDashboard.Consent
    host: containerapp
    language: dotnet
infra:
  provider: bicep
  path: ./infra
  module: main
